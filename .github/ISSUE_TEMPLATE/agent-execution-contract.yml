name: Agent execution contract
description: Define a bounded piece of work for Codex or another coding agent
title: ""
labels: ["contract/draft"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What needs to change, and why?
    validations:
      required: true

  - type: textarea
    id: expected-outcome
    attributes:
      label: Expected outcome
      description: What should be true when this issue is complete?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this contract?
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What must not be changed?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How will the reviewer know the contract was fulfilled?
    validations:
      required: true

  - type: textarea
    id: validation-evidence
    attributes:
      label: Validation evidence expected
      description: What tests, checks, review evidence or manual validation should the pull request provide?
    validations:
      required: true

  - type: dropdown
    id: change-risk
    attributes:
      label: Change risk
      description: Estimate the review and implementation risk for this contract.
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: codex-instructions
    attributes:
      label: Instructions for Codex or other agents
      description: Add relevant files, constraints, assumptions, or things the agent must not infer.
