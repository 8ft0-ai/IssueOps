site_name: IssueOps
site_description: Canonical documentation for the manual execution-contract IssueOps workflow.
repo_url: https://github.com/8ft0-ai/IssueOps
repo_name: 8ft0-ai/IssueOps
docs_dir: docs

theme:
  name: mkdocs

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
  - How-to guides:
      - Overview: how-to/index.md
      - Follow the operating protocol: issueops-protocol.md
      - Complete a delegated batch: delegated-batch-mode.md
      - Prepare a batch completion summary: batch-completion-summaries.md
      - Perform safe tool operations: tool-operations.md
      - Validate MkDocs locally: local-validation.md
      - Publish and verify the site: publishing.md
      - Verify a PR against its contract: contract-verification.md
      - Remediate review feedback: review-remediation.md
  - Reference:
      - Overview: reference/index.md
      - Execution contracts: execution-contracts.md
      - Pull requests as evidence packs: pr-evidence-packs.md
      - PR evidence templates: pr-evidence-templates.md
      - Manual lifecycle labels: labels.md
      - Examples:
          - Overview: examples/README.md
          - Execution contract example: examples/execution-contract-example.md
          - Contract verification example: examples/contract-verification-example.md
      - Change-type validation: change-type-validation.md
      - Repository-native validation: repository-native-validation.md
      - Evidence-pack schema: evidence-pack-schema.md
      - Documentation currency checklist: documentation-currency.md
      - Workflow-change review checklist: workflow-changes.md
  - Explanation:
      - Overview: explanation/index.md
      - Documentation architecture: explanation/documentation-architecture.md
      - Delegated authority and batch mode: delegated-batch-mode.md
      - Site and wiki boundaries: site-vs-wiki.md

markdown_extensions:
  - toc:
      permalink: true

strict: true
